services:
  - type: web
    name: nbb-nbo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free               # upgrade to 'starter' ($7/mo) for always-on

    # Persistent disk — stores the trained XGBoost model pickle between deploys
    disk:
      name: nbo-models
      mountPath: /app/models
      sizeGB: 1

    envVars:
      - key: DATABASE_URL
        sync: false          # set this manually in Render dashboard → your Neon URL

      - key: MODEL_DIR
        value: /app/models

      - key: CORS_ORIGINS
        sync: false          # set to your Vercel frontend URL, e.g. https://nbb-nbo.vercel.app

      - key: PYTHON_VERSION
        value: 3.11.9
